name: CI

on:
  pull_request:
    branches: [dev, prod]
  push:
    branches: [dev, prod]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_ALCHEMY_API_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_API_KEY }}
      NEXT_PUBLIC_DEV_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_DEV_BACKEND_URL }}
      NEXT_PUBLIC_LOCAL_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_LOCAL_BACKEND_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_PROD_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_PROD_BACKEND_URL }}
      NEXT_PUBLIC_PROD_FRONTEND_URL: ${{ secrets.NEXT_PUBLIC_PROD_FRONTEND_URL }}
      NEXT_PUBLIC_SOLANA_RPC_URL: ${{ secrets.NEXT_PUBLIC_SOLANA_RPC_URL }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint || true

      - name: Typecheck
        run: yarn typecheck || true

      - name: Test
        run: yarn test || true

      - name: Build
        run: yarn build